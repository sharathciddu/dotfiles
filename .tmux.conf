#Author: Sharath Ciddu

#Set the default terminal to xterm
set -g default-terminal "screen-256color"

#Send the xterm-keys to the stuff running inside the terminal
set-option -gw xterm-keys on

#Set Ctrl-a as the prefix instead of ctrl b
#unbind C-b
#set -g prefix C-a

# Number windows from 1 instead of 0.
set -g base-index 1

#Short cuts to split the window
#bind -n D-d split-window -h
bind -n C-M-d split-window -v
bind -n M-d split-window -h

# Set visual monitoring on
setw -g monitor-activity on
set -g visual-activity on

# Set the background color of the current window
set-window-option -g window-status-current-bg yellow

# Set pane selecting on using the mouse
set -g mode-mouse on
set -g mouse-resize-pane on
set-option -g mouse-select-pane on

# Pane navigation
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

setw -g mode-keys vi

# Copy mode
unbind [
bind Escape copy-mode

unbind p
bind-key p paste-buffer

bind-key -t vi-copy 'v' begin-selection
bind-key -t vi-copy 'y' copy-selection

bind-key C-y run-shell "tmux show-buffer | xclip -sel clip -i" \; display-message "Copied tmux buffer to system clipboard"



# Do not wait for a lot of time to enter escape mode
#set -sg escape-time 10


#Some status bar stuff
# Bad Wolf by Steve Losh
# =====================
set -g status-fg white
set -g status-bg colour234
# set -g status-bg default #set for transparent background
set -g window-status-activity-attr bold
set -g pane-border-fg colour245
set -g pane-active-border-fg colour39
set -g message-fg colour16
set -g message-bg colour221
set -g message-attr bold
# Custom status bar
# Powerline
set -g status-left-length 32
set -g status-right-length 150
set -g status-interval 5
set -g status-right '#[fg=colour245]❬ %R ❬ %d %b #[fg=colour254,bg=colour234,nobold]#(rdio-current-track-tmux)#[fg=colour16,bg=colour254,bold] #h '
set -g window-status-format "#[fg=white,bg=colour234] #I #W "
set -g window-status-current-format "#[fg=colour234,bg=colour39]#[fg=colour16,bg=colour39,noreverse,bold] #I ❭ #W #[fg=colour39,bg=colour234,nobold]"
